<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-overlay">
  <header class="site-header">
    <img src="HUSHLOGO.png" alt="Logo" class="logo">
  </header>

  <main class="page">
    <div class="container">
      <section class="box">
        <h2>Reset Your Password</h2>
        <p class="form-helper">Enter the email address on your account. Firebase will send the reset email and host the secure password reset page for you.</p>

        <form id="forgotPasswordForm">
          <input type="email" name="email" placeholder="Email address" autocomplete="email" required>

          <button type="submit" class="btn btn-login">Send reset email</button>
        </form>

        <p id="forgotStatus" class="form-status"></p>
        <p><a class="form-link" href="reset-password.html">What happens next?</a></p>
        <p><a class="form-link" href="index.html">Back to login</a></p>
      </section>
    </div>
  </main>

  <script src="firebase-config.js"></script>
  <script src="preferences.js"></script>
  <script type="module" src="forgot-password.js"></script>
</body>
</html>
