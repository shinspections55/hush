<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="theme-color" content="#0F2F44">
    <meta name="description" content="Hush - Silent draft fantasy football league management">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icon-192x192.png">
    <title>Signup — Account System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <img src="HUSHLOGO.png" alt="Logo" class="logo">
    </header>

    <main class="page">
        <div class="container">
            <section class="box">
                <h2>Create Account</h2>
                <p class="account-intro-copy">Use the full registration page to create your account.</p>
                <a class="btn btn-signup account-intro-link" href="register.html">Create an account</a>
            </section>

            <section class="box">
                <h2>Login</h2>
                <form id="loginForm">
                    <input type="email" name="email" placeholder="Email address" autocomplete="email" required>
                    <div class="password-field">
                        <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
                        <button type="button" class="password-toggle" data-password-toggle aria-label="Show password">Show</button>
                    </div>
                    <label class="form-inline-checkbox" for="rememberPassword">
                        <input type="checkbox" id="rememberPassword" name="rememberPassword">
                        Keep me signed in on this browser
                    </label>
                    <a class="form-link" href="forgot-password.html">Forgot password?</a>
                    <button type="submit" class="btn btn-login">Login</button>
                </form>
            </section>
        </div>
    </main>

    <script src="firebase-config.js"></script>
    <script src="preferences.js"></script>
    <script type="module" src="scripts.js"></script>
    <script src="sw-register.js"></script>
</body>
</html>
