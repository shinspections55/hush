<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline Draft Print Sheets</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="offline-draft-print.css">
</head>
<body class="bg-overlay offline-print-page">
  <header class="site-header">
    <img src="HUSHLOGO.png" alt="Hush Logo" class="logo">
    <a href="dashboard.html" class="account-btn">Back to Dashboard</a>
  </header>

  <main class="page offline-print-main">
    <section class="box offline-controls-box">
      <h2>Generate Sheets</h2>
      <div class="offline-controls-grid">
        <label class="offline-field">
          <span>Sheet Source</span>
          <select id="sheetSource">
            <option value="aj">A-J Structured (A-1 through J-2)</option>
            <option value="serverRandom">Server Randomized (current round)</option>
          </select>
        </label>

        <label class="offline-field">
          <span>Number of Drafters</span>
          <input id="teamCountInput" type="number" min="1" max="26" step="1" value="10" placeholder="How many drafters?">
        </label>

        <label class="offline-field" id="draftCodeField">
          <span>Draft Code (for server randomized)</span>
          <input id="draftCodeInput" type="text" maxlength="12" placeholder="Enter draft code">
        </label>
      </div>

      <div class="offline-actions">
        <button id="generateSheetsBtn" type="button" class="btn btn-signup">Generate Sheets</button>
        <button id="printSheetsBtn" type="button" class="btn btn-login">Print</button>
      </div>

      <p id="expectedPagesPreview" class="offline-pages-preview" aria-live="polite"></p>

      <p id="offlineStatus" class="offline-status" aria-live="polite">Select a source and generate sheets.</p>
    </section>

    <section id="printSheetsContainer" class="print-sheets-container"></section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="offline-draft-print.js"></script>
</body>
</html>
